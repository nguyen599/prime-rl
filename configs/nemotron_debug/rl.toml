output_dir = "outputs/rl-nemotron-debug"
clean_output_dir = true
max_steps = 500
seq_len = 4096

[slurm]
job_name = "nemotron-sami-debug"

[deployment]
type = "multi_node"
num_train_nodes = 2
num_infer_nodes = 2

[log]
level = "debug"

[wandb]
project = "nemotron_sami_debug"
name = "nemotron-120b-math"

[weight_broadcast]
type = "nccl"

[model]
name = "nvidia/NVIDIA-Nemotron-3-Super-120B-A12B-BF16"

[trainer.model]
impl = "custom"
attn = "flash_attention_2"
optim_cpu_offload = true
fused_lm_head_token_chunk_size = 8192

[trainer.model.debug]
random_init = true
num_layers = 8

[trainer.model.ac_offloading]
max_inflight_activations = 5

[trainer.model.ac]
freq = 1

[trainer.model.compile]

[orchestrator]
batch_size = 512
group_size = 16

[orchestrator.train.sampling]
max_completion_tokens = 4096

[[orchestrator.train.env]]
name = "hendrycks-math"
taskset = { id = "math-env-v1", dataset_name = "PrimeIntellect/Hendrycks-Math", dataset_subset = "default", task = { math_verify_timeout = 60 } }
harness = { id = "null", runtime = { type = "subprocess" } }

[orchestrator.eval]
interval = 10

[orchestrator.eval.sampling]
max_completion_tokens = 4096

[[orchestrator.eval.env]]
name = "math500"
taskset = { id = "math500-v1" }
num_examples = 30
group_size = 4

[inference.parallel]
tp = 4
dp = 4
