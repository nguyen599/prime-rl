# Debug v1 RL run: the v1 `general-agent-v1` taskset (GeneralAgentSolverTaskset) driven by the
# default harness, with the agent and its tool server colocated in a modal sandbox. Copied from
# configs/general_agent/rl_qwen3_4b.toml and rewired for v1 (taskset + harness + renderer; the
# v0 `id = "general-agent-solver-rlm"` env becomes the v1 taskset + a separate harness).

max_steps = 200
seq_len = 32768

[deployment]
num_train_gpus = 4
num_infer_gpus = 4

[wandb]
project = "general-agent-debug"
name = "qwen3-4b-v1"

[ckpt]
interval = 100
keep_last = 1

[model]
name = "Qwen/Qwen3-4B-Instruct-2507"

[trainer]

[trainer.model]
cp = 2

[trainer.model.ac]
freq = 1

[trainer.model.compile]

[orchestrator]
batch_size = 256
rollouts_per_example = 8
max_off_policy_steps = 32

[orchestrator.renderer]
name = "qwen3"

[[orchestrator.train.env]]
# v1 general-agent solver taskset; the tool server is colocated in the harness's modal sandbox.
taskset = { id = "general-agent-v1", task = { tools = { colocated = true } } }
harness = { id = "null", runtime = { type = "modal" } }

[inference]
gpu_memory_utilization = 0.85

[inference.model]
max_model_len = 32768

[inference.parallel]
dp = 4
