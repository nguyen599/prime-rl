output_dir = "/data/sami_debug/nemotron-debug"
clean_output_dir = true
max_steps = 5
seq_len = 2048

[slurm]
job_name = "nemotron-4node"
pre_run_command = "uv sync --all-extras --group mamba-ssm"

[deployment]
type = "multi_node"
num_train_nodes = 4
num_infer_nodes = 4

[log]
level = "debug"

[wandb]
project = "sami_debug_nemotron"
name = "nemotron-120b-math"

[weight_broadcast]
type = "nccl"

[model]
name = "nvidia/NVIDIA-Nemotron-3-Super-120B-A12B-BF16"

[trainer]
dist_timeout_seconds = 1800

[trainer.model]
impl = "custom"
attn = "flash_attention_2"
optim_cpu_offload = true
ep = 8
fused_lm_head_token_chunk_size = 8192

[trainer.model.ac]
freq = 1

[trainer.model.ac_offloading]
max_inflight_activations = 5

[trainer.model.compile]

[orchestrator]
batch_size = 128
group_size = 8

[orchestrator.train.sampling]
max_completion_tokens = 2048

[[orchestrator.train.env]]
name = "hendrycks-math"
taskset = { id = "math-env-v1", dataset_name = "PrimeIntellect/Hendrycks-Math", dataset_subset = "default", task = { math_verify_timeout = 60 } }
harness = { id = "null", runtime = { type = "subprocess" } }

[orchestrator.eval]
interval = 10

[orchestrator.eval.sampling]
max_completion_tokens = 2048

[[orchestrator.eval.env]]
name = "math500"
taskset = { id = "math500-v1" }
num_examples = 30
group_size = 4

[inference.parallel]
tp = 8
dp = 1
