max_steps = 500
seq_len = 2048

[wandb]
project = "hendrycks-math-debug"
name = "hendrycks-math"

[model]
name = "Qwen/Qwen3-4B-Instruct-2507"

[orchestrator]
batch_size = 512
group_size = 16

[orchestrator.train.sampling]
max_completion_tokens = 2048

[[orchestrator.train.env]]
name = "hendrycks-math"
taskset = { id = "math-env-v1", dataset_name = "PrimeIntellect/Hendrycks-Math", dataset_subset = "default", task = { math_verify_timeout = 60 } }
harness = { id = "null", runtime = { type = "subprocess" } }

[orchestrator.eval]
interval = 10

[orchestrator.eval.sampling]
max_completion_tokens = 2048

[[orchestrator.eval.env]]
name = "math500"
taskset = { id = "math500-v1" }
num_examples = 30
group_size = 4

[trainer] # Default trainer config

[inference] # Default inference config

